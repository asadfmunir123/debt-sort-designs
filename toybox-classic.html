  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"{{ optSubStyle }}\">{{ opt.sub }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"{{ formWrapStyle }}\">\n          <label style=\"{{ fieldStyle }}\">\n            <span style=\"{{ labelStyle }}\">Full name<\u002Fspan>\n            <input type=\"text\" value=\"{{ a.name }}\" onchange=\"{{ setName }}\" placeholder=\"e.g. Sam Taylor\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"{{ fieldStyle }}\">\n            <span style=\"{{ labelStyle }}\">Email address<\u002Fspan>\n            <input type=\"email\" value=\"{{ a.email }}\" onchange=\"{{ setEmail }}\" placeholder=\"you@email.com\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"{{ fieldStyle }}\">\n            <span style=\"{{ labelStyle }}\">Phone number<\u002Fspan>\n            <input type=\"tel\" value=\"{{ a.phone }}\" onchange=\"{{ setPhone }}\" placeholder=\"07…\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"{{ consentStyle }}\">\n            <input type=\"checkbox\" checked=\"{{ a.consent }}\" onchange=\"{{ setConsent }}\" style=\"{{ checkboxStyle }}\">\n            <span style=\"{{ consentTextStyle }}\">Yes, a Debt Sort adviser can contact me about my options. I understand this is not a credit application.<\u002Fspan>\n          <\u002Flabel>\n          <button type=\"button\" onclick=\"{{ submit }}\" disabled=\"{{ submitDisabled }}\" style=\"{{ submitStyle }}\">{{ ctaLabel }}<\u002Fbutton>\n          <p style=\"{{ reassureStyle }}\">No obligation · Free · Your data is safe with us<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ canBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <button type=\"button\" onclick=\"{{ back }}\" style=\"{{ backStyle }}\">← Back<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ done }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"{{ doneWrapStyle }}\">\n      <div style=\"{{ doneBadgeStyle }}\">✓<\u002Fdiv>\n      <h3 style=\"{{ doneTitleStyle }}\">All sorted, {{ firstName }}.<\u002Fh3>\n      <p style=\"{{ doneBodyStyle }}\">Thanks — we’ve got your details. A friendly, qualified adviser will be in touch shortly to talk through your options. No pressure, no jargon.<\u002Fp>\n      <div style=\"{{ doneCardStyle }}\">\n        <div style=\"{{ doneRowStyle }}\"><span style=\"{{ doneKeyStyle }}\">Amount owed<\u002Fspan><span style=\"{{ doneValStyle }}\">{{ sumDebt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"{{ doneRowStyle }}\"><span style=\"{{ doneKeyStyle }}\">Number of debts<\u002Fspan><span style=\"{{ doneValStyle }}\">{{ sumCount }}<\u002Fspan><\u002Fdiv>\n        <div style=\"{{ doneRowStyle }}\"><span style=\"{{ doneKeyStyle }}\">Situation<\u002Fspan><span style=\"{{ doneValStyle }}\">{{ sumWork }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <button type=\"button\" onclick=\"{{ restart }}\" style=\"{{ backStyle }}\">Start again<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TRUST STRIP -->\n  <section style=\"max-width:1180px; margin:0 auto; padding:0 56px 20px;\">\n    <div style=\"background:#fff; border:1px solid #ECE2D0; border-radius:22px; padding:20px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; font-weight:700; font-size:15px;\">\n      <span style=\"display:flex; align-items:center; gap:9px;\"><span style=\"color:#E0B057; font-size:17px; letter-spacing:2px;\">★★★★★<\u002Fspan> Loved by the families we’ve helped<\u002Fspan>\n      <span style=\"color:#857D6E;\">Free &amp; confidential<\u002Fspan>\n      <span style=\"color:#857D6E;\">Friendly UK team<\u002Fspan>\n      <span style=\"color:#857D6E;\">Regulated &amp; authorised<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section id=\"ct-how\" style=\"max-width:1180px; margin:0 auto; padding:78px 56px 24px;\">\n    <div style=\"text-align:center; margin-bottom:46px;\">\n      <span style=\"font-weight:700; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#CE7E6D;\">Child’s play<\u002Fspan>\n      <h2 style=\"font-family:'Quicksand'; font-weight:700; font-size:42px; letter-spacing:-0.02em; margin:8px 0 0;\">Sorting your debt in three moves<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n      <div style=\"background:#E3EBF2; border-radius:26px; padding:34px 28px;\">\n        <div style=\"width:56px;height:56px;border-radius:16px;background:#6E97B8;color:#fff;display:flex;align-items:center;justify-content:center;font:700 26px 'Quicksand'; margin-bottom:18px;box-shadow:inset 0 -5px 0 rgba(0,0,0,.14);\">A<\u002Fdiv>\n        <h3 style=\"font-family:'Quicksand'; font-weight:700; font-size:23px; margin:0 0 8px;\">Empty out the box<\u002Fh3>\n        <p style=\"color:#6C6559; line-height:1.55; margin:0; font-size:16px;\">Answer a few gentle questions so we can see everything you’re juggling. Two minutes, tops.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#F1E4CB; border-radius:26px; padding:34px 28px;\">\n        <div style=\"width:56px;height:56px;border-radius:16px;background:#E0B057;color:#fff;display:flex;align-items:center;justify-content:center;font:700 26px 'Quicksand'; margin-bottom:18px;box-shadow:inset 0 -5px 0 rgba(0,0,0,.14);\">B<\u002Fdiv>\n        <h3 style=\"font-family:'Quicksand'; font-weight:700; font-size:23px; margin:0 0 8px;\">Sort it into shape<\u002Fh3>\n        <p style=\"color:#6C6559; line-height:1.55; margin:0; font-size:16px;\">A real adviser helps you match each piece to the right slot — the plan that actually fits you.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#E4EEE1; border-radius:26px; padding:34px 28px;\">\n        <div style=\"width:56px;height:56px;border-radius:16px;background:#8CAE88;color:#fff;display:flex;align-items:center;justify-content:center;font:700 26px 'Quicksand'; margin-bottom:18px;box-shadow:inset 0 -5px 0 rgba(0,0,0,.14);\">C<\u002Fdiv>\n        <h3 style=\"font-family:'Quicksand'; font-weight:700; font-size:23px; margin:0 0 8px;\">Tidy, at last<\u002Fh3>\n        <p style=\"color:#6C6559; line-height:1.55; margin:0; font-size:16px;\">One simple monthly step replaces the mess — and the worry starts to lift.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ELIGIBILITY -->\n  <section style=\"max-width:1180px; margin:0 auto; padding:70px 56px; display:grid; grid-template-columns:1fr 1fr; gap:52px; align-items:center;\">\n    <div>\n      <h2 style=\"font-family:'Quicksand'; font-weight:700; font-size:38px; letter-spacing:-0.02em; margin:0 0 22px;\">Is Debt Sort your fit?<\u002Fh2>\n      <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:14px;\">\n        <li style=\"display:flex; gap:14px; align-items:flex-start; font-size:17px; line-height:1.5;\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:9px;background:#6E97B8;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;\">✓<\u002Fspan>You live in England, Wales or Northern Ireland<\u002Fli>\n        <li style=\"display:flex; gap:14px; align-items:flex-start; font-size:17px; line-height:1.5;\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:9px;background:#E0B057;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;\">✓<\u002Fspan>Your debts add up to £5,000 or more<\u002Fli>\n        <li style=\"display:flex; gap:14px; align-items:flex-start; font-size:17px; line-height:1.5;\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:9px;background:#CE7E6D;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;\">✓<\u002Fspan>The monthly payments have got too much<\u002Fli>\n        <li style=\"display:flex; gap:14px; align-items:flex-start; font-size:17px; line-height:1.5;\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:9px;background:#8CAE88;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;\">✓<\u002Fspan>You want one tidy plan, not a dozen<\u002Fli>\n      <\u002Ful>\n      <a href=\"#ct-form\" style=\"display:inline-block; margin-top:30px; background:#E0B057; color:#fff; font-weight:700; font-size:16px; padding:14px 26px; border-radius:14px; font-family:'Quicksand';\">See if I fit →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"border-radius:26px; overflow:hidden; height:380px; border:1px solid #ECE2D0;\">\n      <div style=\"width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.045);color:rgba(0,0,0,0.42);font:600 15px sans-serif;text-align:center;padding:28px;box-sizing:border-box;\">Drop a playful, warm photo (kids sorting blocks)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIALS -->\n  <section style=\"background:#6E97B8; color:#F5F9FC;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:78px 56px;\">\n      <h2 style=\"font-family:'Quicksand'; font-weight:700; font-size:40px; letter-spacing:-0.02em; margin:0 0 40px; text-align:center;\">People, put at ease<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n        <figure style=\"background:#fff; color:#3A362F; border-radius:24px; padding:28px; margin:0;\">\n          <div style=\"color:#E0B057; letter-spacing:2px; font-size:15px; margin-bottom:12px;\">★★★★★<\u002Fdiv>\n          <blockquote style=\"font-size:18px; line-height:1.5; margin:0 0 16px; font-weight:600;\">“It felt like untangling a huge knot. By the end of the call I could actually see a way through.”<\u002Fblockquote>\n          <figcaption style=\"font-weight:700; color:#857D6E; font-size:14px;\">Danielle · Sheffield<\u002Ffigcaption>\n        <\u002Ffigure>\n        <figure style=\"background:#fff; color:#3A362F; border-radius:24px; padding:28px; margin:0;\">\n          <div style=\"color:#E0B057; letter-spacing:2px; font-size:15px; margin-bottom:12px;\">★★★★★<\u002Fdiv>\n          <blockquote style=\"font-size:18px; line-height:1.5; margin:0 0 16px; font-weight:600;\">“They never once made me feel silly. Just kind, clear steps I could actually follow.”<\u002Fblockquote>\n          <figcaption style=\"font-weight:700; color:#857D6E; font-size:14px;\">Tom · Newcastle<\u002Ffigcaption>\n        <\u002Ffigure>\n        <figure style=\"background:#fff; color:#3A362F; border-radius:24px; padding:28px; margin:0;\">\n          <div style=\"color:#E0B057; letter-spacing:2px; font-size:15px; margin-bottom:12px;\">★★★★★<\u002Fdiv>\n          <blockquote style=\"font-size:18px; line-height:1.5; margin:0 0 16px; font-weight:600;\">“One payment instead of six. It sounds small but it changed our whole month.”<\u002Fblockquote>\n          <figcaption style=\"font-weight:700; color:#857D6E; font-size:14px;\">Aisha · Birmingham<\u002Ffigcaption>\n        <\u002Ffigure>\n      <\u002Fdiv>\n      <p style=\"text-align:center; opacity:.7; font-size:12px; margin:22px 0 0;\">Illustrative examples for design review.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT / HUMAN -->\n  <section style=\"max-width:1180px; margin:0 auto; padding:78px 56px; display:grid; grid-template-columns:1.05fr 0.95fr; gap:52px; align-items:center;\">\n    <div style=\"border-radius:26px; overflow:hidden; height:360px; border:1px solid #ECE2D0;\">\n      <div style=\"width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.045);color:rgba(0,0,0,0.42);font:600 15px sans-serif;text-align:center;padding:28px;box-sizing:border-box;\">Drop a friendly team photo<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <span style=\"font-weight:700; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#CE7E6D;\">Real people<\u002Fspan>\n      <h2 style=\"font-family:'Quicksand'; font-weight:700; font-size:38px; letter-spacing:-0.02em; margin:8px 0 18px;\">Big worries, sorted into small steps<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.6; color:#857D6E; margin:0 0 16px;\">Debt can feel like a toppling tower of blocks. We’re the friendly UK team who help you take it apart calmly, piece by piece, until it makes sense again.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.6; color:#857D6E; margin:0;\">No judgement. No jargon. Just a steadier tomorrow.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section id=\"ct-faq\" style=\"max-width:820px; margin:0 auto; padding:20px 56px 88px;\">\n    <h2 style=\"font-family:'Quicksand'; font-weight:700; font-size:40px; letter-spacing:-0.02em; margin:0 0 32px; text-align:center;\">The bits people ask about<\u002Fh2>\n    <div style=\"display:flex; flex-direction:column; gap:12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"background:#fff; border:1px solid #ECE2D0; border-radius:18px; overflow:hidden;\">\n          <button type=\"button\" onclick=\"{{ f.toggle }}\" style=\"width:100%; text-align:left; background:none; border:none; padding:20px 24px; display:flex; justify-content:space-between; align-items:center; gap:16px; cursor:pointer; font:700 18px 'Quicksand'; color:#3A362F;\">\n            <span>{{ f.q }}<\u002Fspan>\n            <span style=\"{{ f.iconStyle }}\">+<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0; padding:0 24px 22px; color:#857D6E; line-height:1.6; font-size:16px;\">{{ f.a }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL CTA -->\n  <section style=\"max-width:1180px; margin:0 auto; padding:20px 56px 80px;\">\n    <div style=\"background:#E0B057; border-radius:30px; padding:60px 40px; text-align:center; color:#4A3A18;\">\n      <h2 style=\"font-family:'Quicksand'; font-weight:700; font-size:44px; letter-spacing:-0.02em; margin:0 0 14px;\">Let’s tidy this up together<\u002Fh2>\n      <p style=\"font-size:19px; margin:0 0 28px; color:#6B5628;\">A calmer, clearer money life is closer than you think.<\u002Fp>\n      <a href=\"#ct-form\" style=\"display:inline-block; background:#3A362F; color:#FBF3E2; font-weight:700; font-size:18px; padding:16px 34px; border-radius:16px; font-family:'Quicksand';\">Start sorting →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#3A362F; color:#C9C1B3;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:52px 56px;\">\n      <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:20px;\">\n        <span style=\"width:30px;height:30px;border-radius:9px;background:#6E97B8;color:#fff;display:flex;align-items:center;justify-content:center;font:700 15px 'Quicksand';\">D<\u002Fspan>\n        <span style=\"font:700 18px 'Quicksand'; color:#FBF3E2;\">Debt Sort<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.7; max-width:900px; margin:0 0 16px;\">Debt Sort is a trading name of Debt Sort Ltd, registered in England &amp; Wales (Company No. 00000000). Registered office: 1 Example Street, London, EC1A 1AA. Authorised to act by the Insolvency Practitioners Association. Debt solutions are subject to eligibility and your individual circumstances; fees may apply and will always be explained clearly before you commit.<\u002Fp>\n      <p style=\"font-size:13px; line-height:1.7; max-width:900px; margin:0 0 22px; color:#9A9284;\">Free, impartial debt advice is available from MoneyHelper (moneyhelper.org.uk) and other not-for-profit organisations. Choosing a debt solution may affect your credit rating.<\u002Fp>\n      <div style=\"display:flex; gap:24px; font-size:13px; border-top:1px solid #4A463E; padding-top:20px;\">\n        <a href=\"#ct-form\" style=\"color:#C9C1B3;\">Privacy<\u002Fa>\n        <a href=\"#ct-form\" style=\"color:#C9C1B3;\">Terms<\u002Fa>\n        <a href=\"#ct-form\" style=\"color:#C9C1B3;\">Complaints<\u002Fa>\n        <span style=\"margin-left:auto; color:#7E776B;\">© 2026 Debt Sort Ltd<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { open: 0, step: 0, done: false, answers: { name:'', email:'', phone:'', consent:false } };\n    this.steps = [\n      { key:'debt', q:'Roughly how much do you owe in total?', sub:'Think loans, credit cards, overdrafts and catalogues — leave out your mortgage.', type:'choice', options:[\n        { label:'Under £5,000', value:'Under £5,000' },\n        { label:'£5,000 – £10,000', value:'£5,000–£10,000' },\n        { label:'£10,000 – £20,000', value:'£10,000–£20,000' },\n        { label:'£20,000 – £30,000', value:'£20,000–£30,000' },\n        { label:'More than £30,000', value:'£30,000+' }\n      ]},\n      { key:'count', q:'How many separate debts is that?', sub:'A rough count is fine — we’ll sort the detail together.', type:'choice', options:[\n        { label:'1 – 2 debts', value:'1–2' },\n        { label:'3 – 5 debts', value:'3–5' },\n        { label:'6 – 10 debts', value:'6–10' },\n        { label:'More than 10', value:'10+' }\n      ]},\n      { key:'work', q:'What’s your work situation right now?', sub:'This helps us point you to the right kind of help.', type:'choice', options:[\n        { label:'Employed', value:'Employed' },\n        { label:'Self-employed', value:'Self-employed' },\n        { label:'Not currently working', value:'Not working' },\n        { label:'Retired', value:'Retired' },\n        { label:'Something else', value:'Other' }\n      ]},\n      { key:'details', q:'Nearly there — where shall we send your options?', sub:'One quick step and a real person takes it from here.', type:'form' }\n    ];\n  }\n\n  pick(key, value){ this.setState(s => ({ answers:{...s.answers,[key]:value}, step: Math.min(s.step+1, this.steps.length-1) })); }\n  set(field, value){ this.setState(s => ({ answers:{...s.answers,[field]:value} })); }\n  back(){ this.setState(s => ({ step: Math.max(0, s.step-1), done:false })); }\n  submit(){ this.setState({ done:true }); }\n  restart(){ this.setState({ step:0, done:false, answers:{ name:'', email:'', phone:'', consent:false } }); }\n  W(){\n    const T = { accent:'#6E97B8', accentInk:'#ffffff', ink:'#3A362F', muted:'#857D6E', surface:'#ffffff', track:'#F3EAD6', border:'#ECE2D0', radius:24, headFont:\"'Quicksand', sans-serif\", bodyFont:\"'Nunito Sans', sans-serif\", shadow:\"0 30px 70px -32px rgba(110,90,60,0.5)\", ctaLabel:\"Show my next steps\" };\n    const accent=T.accent, accentInk=T.accentInk, ink=T.ink, muted=T.muted, surface=T.surface, track=T.track, border=T.border, R=T.radius, headFont=T.headFont, bodyFont=T.bodyFont, shadow=T.shadow, ctaLabel=T.ctaLabel;\n    const total = this.steps.length;\n    const step = this.steps[this.state.step] || this.steps[0];\n    const a = this.state.answers;\n    const isChoice = step.type === 'choice';\n    const isForm = step.type === 'form';\n    const pct = this.state.done ? 100 : Math.round(((this.state.step) / total) * 100) + 12;\n    const optBase = { display:'flex', alignItems:'center', gap:'14px', width:'100%', textAlign:'left', padding:'15px 16px', borderRadius: (R-4)+'px', border:'1.5px solid '+border, background: surface, cursor:'pointer', font: '500 16px/1.2 '+bodyFont, color: ink, transition:'all .15s ease', marginBottom:'10px' };\n    const optSel = { ...optBase, borderColor: accent, background: track, boxShadow:'0 0 0 3px '+track };\n    const options = isChoice ? step.options.map(o => { const selected = a[step.key] === o.value; return { label:o.label, sub:o.sub || '', pick: () => this.pick(step.key, o.value), style: selected ? optSel : optBase, dotInner: { display:'block', width:'10px', height:'10px', borderRadius:'50%', background: selected ? accent : 'transparent' } }; }) : [];\n    const canSubmit = a.name.trim() && a.email.trim() && a.phone.trim() && a.consent;\n    const firstName = (a.name.trim().split(' ')[0]) || 'friend';\n    const inputStyle = { width:'100%', padding:'13px 14px', borderRadius:(R-6)+'px', border:'1.5px solid '+border, background: surface, font:'500 16px '+bodyFont, color: ink, outline:'none', boxSizing:'border-box' };\n    return {\n      done: this.state.done, notDone: !this.state.done, isChoice, isForm, options,\n      q: step.q, sub: step.sub, stepNum: this.state.step+1, total, pct,\n      canBack: this.state.step > 0, a, firstName, submitDisabled: !canSubmit, ctaLabel,\n      sumDebt: a.debt || '—', sumCount: a.count || '—', sumWork: a.work || '—',\n      setName: e => this.set('name', e.target.value), setEmail: e => this.set('email', e.target.value),\n      setPhone: e => this.set('phone', e.target.value), setConsent: e => this.set('consent', e.target.checked),\n      submit: () => this.submit(), back: () => this.back(), restart: () => this.restart(),\n      cardStyle: { background: surface, borderRadius: R+'px', padding:'26px 26px 22px', boxShadow: shadow, border:'1px solid '+border, fontFamily: bodyFont },\n      progressTrackStyle: { height:'7px', borderRadius:'99px', background: track, overflow:'hidden' },\n      progressFillBase: { height:'100%', borderRadius:'99px', background: accent, transition:'width .35s cubic-bezier(.4,0,.2,1)' },\n      stepMetaStyle: { margin:'12px 0 2px', font:'600 12px '+bodyFont, letterSpacing:'.08em', textTransform:'uppercase', color: muted },\n      questionStyle: { margin:'6px 0 6px', font:'600 24px/1.2 '+headFont, color: ink, letterSpacing:'-0.01em' },\n      s
