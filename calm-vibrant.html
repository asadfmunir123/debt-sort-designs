  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

);\">D<\u002Fspan>\n          <span style=\"width:30px;height:30px;border-radius:7px;background:#F5A623;color:#fff;display:flex;align-items:center;justify-content:center;font:700 15px 'Space Grotesk';box-shadow:inset 0 -3px 0 rgba(0,0,0,.16);\">S<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font:700 20px 'Space Grotesk'; letter-spacing:-0.01em;\">Debt Sort<\u002Fspan>\n      <\u002Fdiv>\n      <nav style=\"display:flex; align-items:center; gap:30px; font-weight:600; font-size:15px;\">\n        <a href=\"#cv-how\">How it works<\u002Fa>\n        <a href=\"#cv-faq\">FAQs<\u002Fa>\n        <a href=\"#cv-form\" style=\"background:#0E8C7A;color:#fff;padding:10px 20px;border-radius:10px;\">See my options<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section id=\"cv-form\" style=\"max-width:1180px; margin:0 auto; padding:56px 56px 64px; display:grid; grid-template-columns:1fr 0.82fr; gap:60px; align-items:start;\">\n    <div style=\"padding-top:14px;\">\n      <span style=\"display:inline-flex; align-items:center; gap:8px; font-weight:600; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:#0E8C7A; border:1px solid #D9E0DD; padding:6px 13px; border-radius:99px;\">Authorised to act by the IPA<\u002Fspan>\n      <h1 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:60px; line-height:1.02; letter-spacing:-0.03em; margin:24px 0 20px;\">Sort your debt.<br>Steady your future.<\u002Fh1>\n      <p style=\"font-size:19px; line-height:1.6; color:#566862; margin:0 0 32px; max-width:460px;\">Practical, regulated debt help that treats you like a person — one clear step after another, at a pace that suits your family.<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; gap:14px; border-top:1px solid #E3E6E2; padding-top:26px; max-width:440px;\">\n        <div style=\"display:flex; gap:12px; align-items:center; font-size:16px; font-weight:600;\"><span style=\"color:#F5A623; font-size:18px;\">—<\u002Fspan> Free, confidential, no obligation<\u002Fdiv>\n        <div style=\"display:flex; gap:12px; align-items:center; font-size:16px; font-weight:600;\"><span style=\"color:#F5A623; font-size:18px;\">—<\u002Fspan> A qualified UK adviser, not a call centre script<\u002Fdiv>\n        <div style=\"display:flex; gap:12px; align-items:center; font-size:16px; font-weight:600;\"><span style=\"color:#F5A623; font-size:18px;\">—<\u002Fspan> Around two minutes to see where you stand<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"{{ cardStyle }}\" data-crm=\"FLG\" data-crm-url=\"https://getflg.com/\" role=\"form\" aria-label=\"Debt Sort eligibility form\">\n\n  <sc-if value=\"{{ notDone }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"{{ progressTrackStyle }}\">\n        <div style=\"{{ progressFillBase }} width: {{ pct }}%;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ stepMetaStyle }}\">Step {{ stepNum }} of {{ total }}<\u002Fdiv>\n\n      <h3 style=\"{{ questionStyle }}\">{{ q }}<\u002Fh3>\n      <p style=\"{{ subStyle }}\">{{ sub }}<\u002Fp>\n\n      <sc-if value=\"{{ isChoice }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"{{ optionsWrapStyle }}\">\n          <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n            <button type=\"button\" onclick=\"{{ opt.pick }}\" style=\"{{ opt.style }}\">\n              <span style=\"{{ optDotStyle }}\"><span style=\"{{ opt.dotInner }}\"><\u002Fspan><\u002Fspan>\n              <span style=\"{{ optLabelWrap }}\">\n                <span style=\"{{ optLabelStyle }}\">{{ opt.label }}<\u002Fspan>\n                <span style=\"{{ optSubStyle }}\">{{ opt.sub }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"{{ formWrapStyle }}\">\n          <label style=\"{{ fieldStyle }}\">\n            <span style=\"{{ labelStyle }}\">Full name<\u002Fspan>\n            <input type=\"text\" value=\"{{ a.name }}\" onchange=\"{{ setName }}\" placeholder=\"e.g. Sam Taylor\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"{{ fieldStyle }}\">\n            <span style=\"{{ labelStyle }}\">Email address<\u002Fspan>\n            <input type=\"email\" value=\"{{ a.email }}\" onchange=\"{{ setEmail }}\" placeholder=\"you@email.com\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"{{ fieldStyle }}\">\n            <span style=\"{{ labelStyle }}\">Phone number<\u002Fspan>\n            <input type=\"tel\" value=\"{{ a.phone }}\" onchange=\"{{ setPhone }}\" placeholder=\"07…\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"{{ consentStyle }}\">\n            <input type=\"checkbox\" checked=\"{{ a.consent }}\" onchange=\"{{ setConsent }}\" style=\"{{ checkboxStyle }}\">\n            <span style=\"{{ consentTextStyle }}\">Yes, a Debt Sort adviser can contact me about my options. I understand this is not a credit application.<\u002Fspan>\n          <\u002Flabel>\n          <button type=\"button\" onclick=\"{{ submit }}\" disabled=\"{{ submitDisabled }}\" style=\"{{ submitStyle }}\">{{ ctaLabel }}<\u002Fbutton>\n          <p style=\"{{ reassureStyle }}\">No obligation · Free · Your data is safe with us<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ canBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <button type=\"button\" onclick=\"{{ back }}\" style=\"{{ backStyle }}\">← Back<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ done }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"{{ doneWrapStyle }}\">\n      <div style=\"{{ doneBadgeStyle }}\">✓<\u002Fdiv>\n      <h3 style=\"{{ doneTitleStyle }}\">All sorted, {{ firstName }}.<\u002Fh3>\n      <p style=\"{{ doneBodyStyle }}\">Thanks — we’ve got your details. A friendly, qualified adviser will be in touch shortly to talk through your options. No pressure, no jargon.<\u002Fp>\n      <div style=\"{{ doneCardStyle }}\">\n        <div style=\"{{ doneRowStyle }}\"><span style=\"{{ doneKeyStyle }}\">Amount owed<\u002Fspan><span style=\"{{ doneValStyle }}\">{{ sumDebt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"{{ doneRowStyle }}\"><span style=\"{{ doneKeyStyle }}\">Number of debts<\u002Fspan><span style=\"{{ doneValStyle }}\">{{ sumCount }}<\u002Fspan><\u002Fdiv>\n        <div style=\"{{ doneRowStyle }}\"><span style=\"{{ doneKeyStyle }}\">Situation<\u002Fspan><span style=\"{{ doneValStyle }}\">{{ sumWork }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <button type=\"button\" onclick=\"{{ restart }}\" style=\"{{ backStyle }}\">Start again<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TRUST STRIP -->\n  <section style=\"background:#0E8C7A; color:#FFFFFF;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:20px 56px; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; font-weight:600; font-size:14px;\">\n      <span style=\"display:flex; align-items:center; gap:9px;\"><span style=\"color:#F5A623; font-size:16px; letter-spacing:2px;\">★★★★★<\u002Fspan> Rated Excellent · hundreds helped<\u002Fspan>\n      <span style=\"opacity:.82;\">Insolvency Practitioners Association authorised<\u002Fspan>\n      <span style=\"opacity:.82;\">Data handled securely, always confidential<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section id=\"cv-how\" style=\"max-width:1180px; margin:0 auto; padding:84px 56px;\">\n    <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:44px; flex-wrap:wrap;\">\n      <div>\n        <span style=\"font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#F5A623;\">How it works<\u002Fspan>\n        <h2 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:40px; letter-spacing:-0.02em; margin:8px 0 0;\">A clear route, in three steps<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"color:#5C6C66; max-width:340px; font-size:16px; line-height:1.55; margin:0;\">No forms to print, no documents to dig out. Just an honest conversation and a plan that fits.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-top:1px solid #E3E6E2;\">\n      <div style=\"padding:34px 30px 34px 0; border-right:1px solid #E3E6E2;\">\n        <div style=\"font:700 15px 'Space Grotesk'; color:#F5A623; margin-bottom:16px;\">01<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:22px; margin:0 0 10px;\">Share where you’re at<\u002Fh3>\n        <p style=\"color:#5C6C66; line-height:1.6; margin:0; font-size:16px;\">Answer a few plain questions about what you owe and your situation. It stays private.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:34px 30px; border-right:1px solid #E3E6E2;\">\n        <div style=\"font:700 15px 'Space Grotesk'; color:#F5A623; margin-bottom:16px;\">02<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:22px; margin:0 0 10px;\">We map your options<\u002Fh3>\n        <p style=\"color:#5C6C66; line-height:1.6; margin:0; font-size:16px;\">A qualified adviser explains the routes open to you and the trade-offs of each, in plain English.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:34px 0 34px 30px;\">\n        <div style=\"font:700 15px 'Space Grotesk'; color:#F5A623; margin-bottom:16px;\">03<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:22px; margin:0 0 10px;\">You choose your path<\u002Fh3>\n        <p style=\"color:#5C6C66; line-height:1.6; margin:0; font-size:16px;\">Only when you’re ready. We set up one manageable step forward and stay alongside you.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ELIGIBILITY -->\n  <section style=\"background:#F1F6F4;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:72px 56px; display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center;\">\n      <div>\n        <h2 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:36px; letter-spacing:-0.02em; margin:0 0 24px;\">Is this the right step for you?<\u002Fh2>\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"display:flex; gap:14px; align-items:center; padding:16px 0; border-top:1px solid #E3E6E2; font-size:17px;\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:6px;background:#0E8C7A;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;\">✓<\u002Fspan>You live in England, Wales or Northern Ireland<\u002Fdiv>\n          <div style=\"display:flex; gap:14px; align-items:center; padding:16px 0; border-top:1px solid #E3E6E2; font-size:17px;\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:6px;background:#0E8C7A;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;\">✓<\u002Fspan>You owe £5,000 or more, unsecured<\u002Fdiv>\n          <div style=\"display:flex; gap:14px; align-items:center; padding:16px 0; border-top:1px solid #E3E6E2; font-size:17px;\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:6px;background:#0E8C7A;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;\">✓<\u002Fspan>Monthly repayments have become unmanageable<\u002Fdiv>\n          <div style=\"display:flex; gap:14px; align-items:center; padding:16px 0; border-top:1px solid #E3E6E2; border-bottom:1px solid #E3E6E2; font-size:17px;\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:6px;background:#0E8C7A;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;\">✓<\u002Fspan>You want one clear plan, not many<\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"#cv-form\" style=\"display:inline-block; margin-top:28px; background:#F5A623; color:#4A2E00; font-weight:700; font-size:16px; padding:13px 26px; border-radius:10px;\">Check my eligibility →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"border-radius:14px; overflow:hidden; height:400px; border:1px solid #E3E6E2;\">\n        <div style=\"width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.045);color:rgba(0,0,0,0.42);font:600 15px sans-serif;text-align:center;padding:28px;box-sizing:border-box;\">Drop a calm, reassuring photo<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIALS -->\n  <section style=\"max-width:1180px; margin:0 auto; padding:80px 56px;\">\n    <h2 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:38px; letter-spacing:-0.02em; margin:0 0 40px;\">What people tell us afterwards<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n      <figure style=\"background:#FFFFFF; border:1px solid #E3E6E2; border-radius:14px; padding:30px; margin:0;\">\n        <div style=\"color:#F5A623; letter-spacing:2px; font-size:15px; margin-bottom:14px;\">★★★★★<\u002Fdiv>\n        <blockquote style=\"font-family:'Space Grotesk'; font-weight:500; font-size:19px; line-height:1.4; margin:0 0 18px;\">“For the first time in years I knew exactly what my next step was. That certainty was everything.”<\u002Fblockquote>\n        <figcaption style=\"font-weight:600; color:#5C6C66; font-size:14px;\">Gavin · Nottingham<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure style=\"background:#FFFFFF; border:1px solid #E3E6E2; border-radius:14px; padding:30px; margin:0;\">\n        <div style=\"color:#F5A623; letter-spacing:2px; font-size:15px; margin-bottom:14px;\">★★★★★<\u002Fdiv>\n        <blockquote style=\"font-family:'Space Grotesk'; font-weight:500; font-size:19px; line-height:1.4; margin:0 0 18px;\">“Calm, straight answers. They laid out my choices and let me decide in my own time.”<\u002Fblockquote>\n        <figcaption style=\"font-weight:600; color:#5C6C66; font-size:14px;\">Sara · Glasgow<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure style=\"background:#FFFFFF; border:1px solid #E3E6E2; border-radius:14px; padding:30px; margin:0;\">\n        <div style=\"color:#F5A623; letter-spacing:2px; font-size:15px; margin-bottom:14px;\">★★★★★<\u002Fdiv>\n        <blockquote style=\"font-family:'Space Grotesk'; font-weight:500; font-size:19px; line-height:1.4; margin:0 0 18px;\">“I expected to feel judged. Instead I felt listened to. That made all the difference.”<\u002Fblockquote>\n        <figcaption style=\"font-weight:600; color:#5C6C66; font-size:14px;\">Leon · Swansea<\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fdiv>\n    <p style=\"color:#A79D89; font-size:12px; margin:22px 0 0;\">Illustrative examples for design review.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ABOUT / HUMAN -->\n  <section style=\"background:#0E8C7A; color:#FFFFFF;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:80px 56px; display:grid; grid-template-columns:0.9fr 1.1fr; gap:56px; align-items:center;\">\n      <div style=\"border-radius:14px; overflow:hidden; height:340px;\">\n        <div style=\"width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.045);color:rgba(0,0,0,0.42);font:600 15px sans-serif;text-align:center;padding:28px;box-sizing:border-box;\">Drop a friendly team photo<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <span style=\"font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#F5A623;\">The people behind it<\u002Fspan>\n        <h2 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:36px; letter-spacing:-0.02em; margin:8px 0 18px;\">Serious about debt. Gentle with people.<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.65; opacity:.9; margin:0 0 16px;\">We’re a UK team who’ve seen how heavy debt can feel, and how much lighter it gets once it’s sorted into a clear plan. We treat every conversation with the seriousness it deserves and the warmth you’d hope for.<\u002Fp>\n        <p style=\"font-size:18px; line-height:1.65; opacity:.9; margin:0;\">Regulated, honest, and firmly on your side.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section id=\"cv-faq\" style=\"max-width:820px; margin:0 auto; padding:84px 56px;\">\n    <h2 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:38px; letter-spacing:-0.02em; margin:0 0 32px;\">Your questions, answered plainly<\u002Fh2>\n    <div style=\"border-top:1px solid #E3E6E2;\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"border-bottom:1px solid #E3E6E2;\">\n          <button type=\"button\" onclick=\"{{ f.toggle }}\" style=\"width:100%; text-align:left; background:none; border:none; padding:22px 4px; display:flex; justify-content:space-between; align-items:center; gap:16px; cursor:pointer; font:600 18px 'Space Grotesk'; color:#16211D;\">\n            <span>{{ f.q }}<\u002Fspan>\n            <span style=\"{{ f.iconStyle }}\">+<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0; padding:0 4px 24px; color:#5C6C66; line-height:1.65; font-size:16px; max-width:640px;\">{{ f.a }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL CTA -->\n  <section style=\"border-top:1px solid #E3E6E2;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:74px 56px; text-align:center;\">\n      <h2 style=\"font-family:'Space Grotesk'; font-weight:700; font-size:42px; letter-spacing:-0.03em; margin:0 0 14px;\">Take the first clear step<\u002Fh2>\n      <p style=\"font-size:19px; color:#566862; margin:0 0 30px;\">See your options in about two minutes. No obligation, no pressure.<\u002Fp>\n      <a href=\"#cv-form\" style=\"display:inline-block; background:#0E8C7A; color:#FFFFFF; font-weight:700; font-size:18px; padding:16px 36px; border-radius:12px;\">See my options →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#16211D; color:#B7C0BA;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:52px 56px;\">\n      <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:20px;\">\n        <span style=\"width:30px;height:30px;border-radius:7px;background:#F5A623;color:#16211D;display:flex;align-items:center;justify-content:center;font:700 15px 'Space Grotesk';\">D<\u002Fspan>\n        <span style=\"font:700 18px 'Space Grotesk'; color:#FFFFFF;\">Debt Sort<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:13px; line-height:1.7; max-width:900px; margin:0 0 16px;\">Debt Sort is a trading name of Debt Sort Ltd, registered in England &amp; Wales (Company No. 00000000). Registered office: 1 Example Street, London, EC1A 1AA. Authorised to act by the Insolvency Practitioners Association. Debt solutions are subject to eligibility and your individual circumstances; fees may apply and will always be explained clearly before you commit.<\u002Fp>\n      <p style=\"font-size:13px; line-height:1.7; max-width:900px; margin:0 0 22px; color:#83908A;\">Free, impartial debt advice is available from MoneyHelper (moneyhelper.org.uk) and other not-for-profit organisations. Choosing a debt solution may affect your credit rating.<\u002Fp>\n      <div style=\"display:flex; gap:24px; font-size:13px; border-top:1px solid #3B4842; padding-top:20px;\">\n        <a href=\"#cv-form\" style=\"color:#B7C0BA;\">Privacy<\u002Fa>\n        <a href=\"#cv-form\" style=\"color:#B7C0BA;\">Terms<\u002Fa>\n        <a href=\"#cv-form\" style=\"color:#B7C0BA;\">Complaints<\u002Fa>\n        <span style=\"margin-left:auto; color:#6B766F;\">© 2026 Debt Sort Ltd<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { open: 0, step: 0, done: false, answers: { name:'', email:'', phone:'', consent:false } };\n    this.steps = [\n      { key:'debt', q:'Roughly how much do you owe in total?', sub:'Think loans, credit cards, overdrafts and catalogues — leave out your mortgage.', type:'choice', options:[\n        { label:'Under £5,000', value:'Under £5,000' },\n        { label:'£5,000 – £10,000', value:'£5,000–£10,000' },\n        { label:'£10,000 – £20,000', value:'£10,000–£20,000' },\n        { label:'£20,000 – £30,000', value:'£20,000–£30,000' },\n        { label:'More than £30,000', value:'£30,000+' }\n      ]},\n      { key:'count', q:'How many separate debts is that?', sub:'A rough count is fine — we’ll sort the detail together.', type:'choice', options:[\n        { label:'1 – 2 debts', value:'1–2' },\n        { label:'3 – 5 debts', value:'3–5' },\n        { label:'6 – 10 debts', value:'6–10' },\n        { label:'More than 10', value:'10+' }\n      ]},\n      { key:'work', q:'What’s your work situation right now?', sub:'This helps us point you to the right kind of help.', type:'choice', options:[\n        { label:'Employed', value:'Employed' },\n        { label:'Self-employed', value:'Self-employed' },\n        { label:'Not currently working', value:'Not working' },\n        { label:'Retired', value:'Retired' },\n        { label:'Something else', value:'Other' }\n      ]},\n      { key:'details', q:'Nearly there — where shall we send your options?', sub:'One quick step and a real person takes it from here.', type:'form' }\n    ];\n  }\n\n  pick(key, value){ this.setState(s => ({ answers:{...s.answers,[key]:value}, step: Math.min(s.step+1, this.steps.length-1) })); }\n  set(field, value){ this.setState(s => ({ answers:{...s.answers,[field]:value} })); }\n  back(){ this.setState(s => ({ step: Math.max(0, s.step-1), done:false })); }\n  submit(){ this.setState({ done:true }); }\n  restart(){ this.setState({ step:0, done:false, answers:{ name:'', email:'', phone:'', consent:false } }); }\n  W(){\n    const T = { accent:'#0E8C7A', accentInk:'#ffffff', ink:'#16211D', muted:'#5C6C66', surface:'#FFFFFF', track:'#EAF4F1', border:'#E3E6E2', radius:12, headFont:\"'Space Grotesk', sans-serif\", bodyFont:\"'Figtree', sans-serif\", shadow:\"0 26px 64px -34px rgba(30,45,40,0.55)\", ctaLabel:\"See my options\" };\n    const accent=T.accent, accentInk=T.accentInk, ink=T.ink, muted=T.muted, surface=T.surface, track=T.track, border=T.border, R=T.radius, headFont=T.headFont, bodyFont=T.bodyFont, shadow=T.shadow, ctaLabel=T.ctaLabel;\n    const total = this.steps.length;\n    const step = this.steps[this.state.step] || this.steps[0];\n    const a = this.state.answers;\n    const isChoice = step.type === 'choice';\n    const isForm = step.type === 'form';\n    const pct = this.state.done ? 100 : Math.round(((this.state.step) / total) * 100) + 12;\n    const optBase = { display:'flex', alignItems:'center', gap:'14px', width:'100%', textAlign:'left', padding:'15px 16px', borderRadius: (R-4)+'px', border:'1.5px solid '+border, background: surface, cursor:'pointer', font: '500 16px/1.2 '+bodyFont, color: ink, transition:'all .15s ease', marginBottom:'10px' };\n    const optSel = { ...optBase, borderColor: accent, background: track, boxShadow:'0 0 0 3px '+track };\n    const options = isChoice ? step.options.map(o => { const selected = a[step.key] === o.value; return { label:o.label, sub:o.sub || '', pick: () => this.pick(step.key, o.value), style: selected ? optSel : optBase, dotInner: { display:'block', width:'10px', height:'10px', borderRadius:'50%', background: selected ? accent : 'transparent' } }; }) : [];\n    const canSubmit = a.name.trim() && a.email.trim() && a.phone.trim() && a.consent;\n    const firstName = (a.name.trim().split(' ')[0]) || 'friend';\n    const inputStyle = { width:'100%', padding:'13px 14px', borderRadius:(R-6)+'px', border:'1.5px solid '+border, background: surface, font:'500 16px '+bodyFont, color: ink, outline:'none', boxSizing:'border-box' };\n    return {\n      done: this.state.done, notDone: !this.state.done, isChoice, isForm, options,\n      q: step.q, sub: step.sub, stepNum: this.state.step+1, total, pct,\n      canBack: this.state.step > 0, a, firstName, submitDisabled: !canSubmit, ctaLabel,\n      sumDebt: a.debt || '—', sumCount: a.count || '—', sumWork: a.work || '—',\n      setName: e => this.set('name', e.target.value), setEmail: e => this.set('email', e.target.value),\n      setPhone: e => this.set('phone', e.target.value), setConsent: e => this.set('consent', e.target.checked),\n      submit: () => this.submit(), back: () => this.back(), restart: () => this.restart(),\n      cardStyle: { background: surface, borderRadius: R+'px', padding:'26px 26px 22px', boxShadow: shadow, border:'1px solid '+border, fontFamily: bodyFont },\n      progressTrackStyle: { height:'7px', borderRadius:'99px', background: track, overflow:'hidden' },\n      progressFillBase: { height:'100%', borderRadius:'99px', background: accent, transition:'width .35s cubic-bezier(.4,0,.2,1)' },\n      stepMetaStyle: { margin:'12px 0 2px', font:'600 12px '+bodyFont, letterSpacing:'.08em', textTransform:'uppercase', color: muted },\n      questionStyle: { margin:'6px 0 6px', font:'600 24px/1.2 '+headFont, color: ink, letterSpacing:'-0.01em' },\n      subStyle: { margin:'0 0 20px', font:'400 15px/1.45 '+bodyFont, color: muted },\n      optionsWrapStyle: { display:'flex', flexDirection:'column' },\n      optDotStyle: { flex:'0 0 auto', width:'22px', height:'22px', borderRadius:'50%', border:'2px solid '+border, display:'flex', alignItems:'center', justifyContent:'center' },\n      optLabelWrap: { display:'flex', flexDirection:'column' },\n      optLabelStyle: { font:'600 16px '+bodyFont, color: ink }, optSubStyle: { font:'400 13px '+bodyFont, color: muted },\n      formWrapStyle: { display:'flex', flexDirection:'column', gap:'14px' },\n      fieldStyle: { display:'flex', flexDirection:'column', gap:'6px' },\n      labelStyle: { font:'600 13px '+bodyFont, color: ink }, inputStyle,\n      consentStyle: { display:'flex', alignItems:'flex-start', gap:'10px', margin:'2px 0 4px', cursor:'pointer' },\n      checkboxStyle: { width:'20px', height:'20px', marginTop:'2px', accentColor: accent, flex:'0 0 auto' },\n      consentTextStyle: { font:'400 13px/1.45 '+bodyFont, color: muted },\n      submitStyle: { marginTop:'4px', width:'100%', padding:'15px', borderRadius:(R-4)+'px', border:'none', background: canSubmit ? accent : border, color: canSubmit ? accentInk : muted, font:'700 17px '+bodyFont, cursor: canSubmit ? 'pointer':'not-allowed', transition:'all .15s ease' },\n      reassureStyle: { margin:'2px 0 0', textAlign:'center', font:'500 12px '+bodyFont, color: muted },\n      backStyle: { marginTop:'14px', background:'none', border:'none', padding:'6px 0', font:'600 14px '+bodyFont, color: muted, cursor:'pointer' },\n      doneWrapStyle: { textAlign:'center', padding:'6px 0' },\n      doneBadgeStyle: { width:'56px', height:'56px', borderRadius:'50%', background: accent, color: accentInk, font:'700 26px '+bodyFont, display:'flex', alignItems:'center', justifyContent:'center', margin:'4px auto 16px' },\n      doneTitleStyle: { margin:'0 0 10px', font:'600 26px/1.15 '+headFont, color: ink, letterSpacing:'-0.01em' },\n      doneBodyStyle: { margin:'0 auto 20px', maxWidth:'340px', font:'400 15px/1.5 '+bodyFont, color: muted },\n      doneCardStyle: { textAlign:'left', background: track, borderRadius:(R-4)+'px', padding:'14px 16px', display:'flex', flexDirection:'column', gap:'8px' },\n      done
